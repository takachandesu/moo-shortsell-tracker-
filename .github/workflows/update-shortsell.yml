name: Short Selling Ratio Daily Update

on:
  schedule:
    # JPXは営業日の夕方に公表 → 19:00 JST = 10:00 UTC に起動（祝日は新規PDFが無いだけで無害）
    - cron: '0 10 * * 1-5'
  workflow_dispatch: {}        # 手動実行も可（Actionsタブ → Run workflow）

permissions:
  contents: write              # data/ の蓄積JSONをコミットし戻すため

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests pdfplumber

      - name: Fetch & build JSON
        run: python scripts/fetch_shortsell.py

      - name: Commit rolling data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/shortsell-data.json
          git commit -m "update shortsell-data $(date -u +%Y-%m-%d)" || echo "no changes"
          git push || echo "nothing to push"

      - name: Upload to Lolipop (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.LOLIPOP_FTP_HOST }}
          username: ${{ secrets.LOLIPOP_FTP_USER }}
          password: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: ${{ secrets.LOLIPOP_FTP_PATH }}
          dry-run: false
          dangerous-clean-slate: false
          state-name: .ftp-deploy-shortsell.json   # ★ FTP衝突対策メモ準拠：テーマ固有名
